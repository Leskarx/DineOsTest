version: "3.9"

# ────────────────────────────────────────────────────────────────
#  Dine&Stay OS — Production stack
#  Usage:
#    docker compose -f docker-compose.prod.yml up -d
#    docker compose -f docker-compose.prod.yml up -d --build   # rebuild images
#
#  Prerequisite: copy .env.example → .env and fill in all values.
# ────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dinestay_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
        reservations:
          memory: 512m
          cpus: "0.25"

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dinestay_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 64m
          cpus: "0.05"

  # ── MinIO (optional — private VPS object storage) ─────────────
  minio:
    image: minio/minio:latest
    container_name: dinestay_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"
        reservations:
          memory: 128m
          cpus: "0.05"
    profiles:
      - minio

  # ── NestJS API ────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: dinestay_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      NODE_ENV: production
      S3_ENDPOINT: ${S3_ENDPOINT:-}
    volumes:
      - api_uploads:/app/uploads
    expose:
      - "4000"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.1"

  # ── Next.js Web App ───────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: dinestay_web
    restart: always
    depends_on:
      - api
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_OUTPUT: standalone
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"
        reservations:
          memory: 128m
          cpus: "0.1"

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dinestay_nginx
    restart: always
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /var/www/certbot:/var/www/certbot:ro   # Let's Encrypt ACME challenge
      - nginx_cache:/var/cache/nginx
    healthcheck:
      # Probe actual liveness — not just config syntax
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 32m
          cpus: "0.05"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_uploads:
  nginx_cache:
