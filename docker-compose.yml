# ────────────────────────────────────────────────────────────────
#  Dine&Stay OS — Development stack
#  Usage:
#    docker compose up              # start everything
#    docker compose up -d           # start in background
#    docker compose logs -f api     # follow API logs
#    docker compose down -v         # stop + delete volumes
# ────────────────────────────────────────────────────────────────

services:
  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dinestay_redis
    restart: unless-stopped
    command: redis-server --requirepass changeme
    ports:
      - "127.0.0.1:6379:6379"   # loopback only — not exposed to LAN/cloud network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── MinIO (optional local object storage) ─────────────────────
  # Only needed when STORAGE_DRIVER=s3 with local MinIO.
  # Access the MinIO console at http://localhost:9001
  minio:
    image: minio/minio:latest
    container_name: dinestay_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - minio           # start with:  docker compose --profile minio up

  # ── NestJS API ────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: dinestay_api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # Override host names to match Docker service names
      DB_HOST: postgres
      REDIS_HOST: redis
      # When using MinIO profile, point storage at it
      S3_ENDPOINT: ${S3_ENDPOINT:-}
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/src:delegated
      # Persist local uploads across restarts
      - api_uploads:/app/uploads
    command: npm run start:dev

  # ── Next.js Web App ───────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: dinestay_web
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/src:delegated
      - ./apps/web/public:/app/public:delegated
    command: npm run dev

volumes:
  redis_data:
  minio_data:
  api_uploads:
